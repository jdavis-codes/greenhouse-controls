[platformio]
# Tell PlatformIO where the main sketch is located
src_dir = arduino-greenhouse-controller

[env:atmega_nano]
platform = atmelavr
board = nanoatmega328
framework = arduino

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = arduino_nano_esp32
framework = arduino

[env:greenhouse_controller_esp32]
extends = env:esp32
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = arduino-greenhouse-controller
# PlatformIO will automatically download these libraries
# (Arduino IDE users will just install them via the Library Manager as usual)
lib_deps = 
    robtillaart/DHTstable @ ^1.1.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.3

[env:greenhouse_controller_atmega_nano]
extends = env:atmega_nano
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = arduino-greenhouse-controller
lib_deps = 
    robtillaart/DHTstable @ ^1.1.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.3

[env:TelegramSerial_test]
extends = env:esp32
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = TelegramSerial-test

# Download the two Telegram libraries via PlatformIO Registry
lib_deps = 
    toastmanau/TelegramSerial @ ^1.0.0
    gyverlibs/FastBot2 @ ^1.2.6

[env:FastBot2_telegram_test]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = FastBot2-telegram-test
lib_deps = 
    gyverlibs/FastBot2 @ ^1.2.6

[env:telegram_forwarder]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = telegram-forwarder
lib_deps = 
    toastmanau/TelegramSerial @ ^1.0.0
    jmwanderer/RYLR_LoRaAT @ ^0.1.2

[env:lora_sender]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = lora-sender
lib_deps = 
    jmwanderer/RYLR_LoRaAT @ ^0.1.2