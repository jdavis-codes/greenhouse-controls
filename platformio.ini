[platformio]
# Tell PlatformIO where the main sketch is located
src_dir = arduino-greenhouse-controller

[env:atmega_nano]
platform = atmelavr
board = nanoatmega328
framework = arduino

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = arduino_nano_esp32
framework = arduino

[env:resident1]
extends = env:atmega_nano
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = resident1
lib_deps = 
    robtillaart/DHTstable @ ^1.1.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.3
    gyverlibs/FastBot2 @ ^1.2.6

[env:0-1--library-trial--TelegramSerial-test]
extends = env:esp32
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = 0.1--library-trial--TelegramSerial-test

# Download the two Telegram libraries via PlatformIO Registry
lib_deps = 
    toastmanau/TelegramSerial @ ^1.0.0
    gyverlibs/FastBot2 @ ^1.2.6
    gyverlibs/FastBot @ ^2.27.3


[env:0-2--Library-Trial--FastBot2-telegram]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 0.2--Library-Trial--FastBot2-telegram
lib_deps = 
    gyverlibs/FastBot2 @ ^1.2.6
    gyverlibs/FastBot @ ^2.27.3
    adafruit/RTClib @ ^2.1.3
board_build.filesystem = fatfs

[env:0-2-1--Library-Trial--FastBot2-telegram-extra-file-upload]
extends = env:0-2--Library-Trial--FastBot2-telegram
upload_protocol = esptool
upload_flags =
    --no-stub
upload_speed = 115200

[env:0-3--Library-Trial--ring-buffer-test]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 0.3--Library-Trial--ring-buffer-test
build_flags = 
    -DBOARD_HAS_PSRAM
lib_deps = 
    adafruit/RTClib @ ^2.1.3

[env:1-0--Radio-Test--simple-radio-sender]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 1.0--Radio-Test--simple-radio-sender
lib_deps = 
    jmwanderer/RYLR_LoRaAT @ ^0.1.2

[env:1-1--Radio-Test--simple-telegram-data-forwarder]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 1.1--Radio-Test--simple-telegram-data-forwarder
lib_deps = 
    toastmanau/TelegramSerial @ ^1.0.0
    jmwanderer/RYLR_LoRaAT @ ^0.1.2
    

[env:2-0--esp32--Field-Ready--greenhouse-control--radio-sender]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 2.0.ESP32--Field-Ready--greenhouse-control+radio-sender
lib_deps =
    jmwanderer/RYLR_LoRaAT @ ^0.1.2

[env:2-0--nano--Field-Ready--greenhouse-control--radio-sender]
extends = env:atmega_nano
extra_scripts = pre:set_src_dir.py
custom_src_dir = 2.0.NANO--Field-Ready--greenhouse-control+radio-sender

[env:2-1--Field-Ready--radio-reciever--telegram-data-forwarder]
extends = env:esp32
extra_scripts = pre:set_src_dir.py
custom_src_dir = 2.1--Field-Ready--radio-reciever+telegram-data-forwarder
build_flags = 
    -DBOARD_HAS_PSRAM
lib_deps = 
    jmwanderer/RYLR_LoRaAT @ ^0.1.2
    gyverlibs/FastBot2 @ ^1.2.6
    adafruit/RTClib @ ^2.1.3


[env:3-0--esp32--Fully-integrated--greenhouse-controller--telegram-data-forwader]
extends = env:esp32
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = 3.0--Fully-integrated--greenhouse-controller+telegram-data-forwader
# PlatformIO will automatically download these libraries
# (Arduino IDE users will just install them via the Library Manager as usual)
lib_deps = 
    robtillaart/DHTstable @ ^1.1.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.3
    gyverlibs/FastBot2 @ ^1.2.6

[env:3-0--atmega_nano--Fully-integrated--greenhouse-controller-and-telegram-data-forwader]
extends = env:atmega_nano
extra_scripts = pre:set_src_dir.py # Redirect source directory via the generic switcher script
custom_src_dir = 3.0--Fully-integrated--greenhouse-controller+telegram-data-forwader
lib_deps = 
    robtillaart/DHTstable @ ^1.1.1
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/RTClib @ ^2.1.3